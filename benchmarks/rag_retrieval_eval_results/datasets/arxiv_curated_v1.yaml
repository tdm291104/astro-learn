name: arxiv_curated_v1
description: |
  Hand-curated golden dataset for the RAG retrieval evaluation. 30 grounded questions across 6 arxiv
  astronomy papers, written by reading each paper directly. Each question targets
  a specific fact (number, name, method, definition) verifiable by a distinctive
  substring on the cited page. Mix of types: numeric values, methods, definitions,
  comparisons. No reference/title/figure-caption questions.

queries:
  # === llm_astronomy_eval.pdf (Wu et al. 2024) ===

  - id: q01
    question: What model did Nguyen et al. release as AstroLLaMA?
    tags: [llm_astronomy_eval, entity, fact]
    relevant:
      - doc_id: 7a519c2f-5f4f-51b5-a333-9697776a373a
        page: 2
        contains: "AstroLLaMA, a\nLLaMA-2 7B model fine-tuned"

  - id: q02
    question: Approximately how many astronomy abstracts were used to train AstroLLaMA?
    tags: [llm_astronomy_eval, numeric]
    relevant:
      - doc_id: 7a519c2f-5f4f-51b5-a333-9697776a373a
        page: 2
        contains: "over 300,000 astron-\nomy abstracts from arXiv"

  - id: q03
    question: Which generator LLM does the RAG framework use by default?
    tags: [llm_astronomy_eval, method]
    relevant:
      - doc_id: 7a519c2f-5f4f-51b5-a333-9697776a373a
        page: 3
        contains: "currently use gpt-4o as the generator LLM"

  - id: q04
    question: Which encoder model does the framework use to embed user queries?
    tags: [llm_astronomy_eval, method]
    relevant:
      - doc_id: 7a519c2f-5f4f-51b5-a333-9697776a373a
        page: 2
        contains: "bge-small-en-v1.5 as the encoder"

  - id: q05
    question: How many papers does the RAG system retrieve per query?
    tags: [llm_astronomy_eval, numeric, method]
    relevant:
      - doc_id: 7a519c2f-5f4f-51b5-a333-9697776a373a
        page: 3
        contains: "top k = 5 papers by cosine"

  - id: q06
    question: What is the maximum character length the paper reports for arXiv abstracts?
    tags: [llm_astronomy_eval, numeric]
    relevant:
      - doc_id: 7a519c2f-5f4f-51b5-a333-9697776a373a
        page: 3
        contains: "always contain fewer than 1920 characters"

