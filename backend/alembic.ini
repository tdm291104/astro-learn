# Alembic config — see https://alembic.sqlalchemy.org/en/latest/tutorial.html#editing-the-ini-file
#
# `sqlalchemy.url` is left blank intentionally. The real URL is read
# from `core.config.settings.DATABASE_URL` inside `alembic/env.py`,
# so the same .env that drives the app drives migrations.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]

# --- Logging ------------------------------------------------------------------

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
